name: Frontend CI - Flutter Tests
on:
  push:
    branches:
      - "**"
  pull_request:
    branches: ["main"]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/frontend-ci.yml'

  frontend-test:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"
      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get
      - name: Analyze code
        run: |
          cd frontend
          flutter analyze
      - name: Run tests
        run: |
          cd frontend
          flutter test

  skip-logic:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.frontend != 'true' }}
    steps:
      - name: Skip message
        run: echo "No frontend changes, skipping frontend tests."
